name: Deploy to Hostpoint

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostpoint-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and FTPS deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTPOINT_FTP_SERVER }}
          username: ${{ secrets.HOSTPOINT_FTP_USERNAME }}
          password: ${{ secrets.HOSTPOINT_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./out/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
